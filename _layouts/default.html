<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
    {% if page.math %}
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
      <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>
    {% endif %}
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        line-height: 1.6;
        color: #333;
      }

      body {
        background-color: #fff;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 20px;
      }

      header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px 0;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      }

      .header-container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .site-title {
        font-size: 1.5em;
        font-weight: bold;
        text-decoration: none;
        color: white;
      }

      .site-title:hover {
        opacity: 0.9;
      }

      nav {
        display: flex;
        gap: 30px;
      }

      nav a {
        color: white;
        text-decoration: none;
        font-weight: 500;
        transition: opacity 0.3s;
      }

      nav a:hover {
        opacity: 0.8;
      }

      main {
        min-height: calc(100vh - 200px);
        padding: 40px 0;
      }

      footer {
        background-color: #f5f5f5;
        color: #666;
        text-align: center;
        padding: 30px 20px;
        margin-top: 60px;
        border-top: 1px solid #e0e0e0;
      }

      h1, h2, h3, h4, h5, h6 {
        margin-top: 30px;
        margin-bottom: 15px;
        font-weight: 600;
      }

      h1 { font-size: 2.5em; }
      h2 { font-size: 2em; color: #333; border-bottom: 3px solid #667eea; padding-bottom: 10px; }
      h3 { font-size: 1.5em; }
      h4 { font-size: 1.2em; }

      p {
        margin-bottom: 15px;
        line-height: 1.8;
      }

      a {
        color: #667eea;
        text-decoration: none;
        transition: color 0.3s;
      }

      a:hover {
        color: #764ba2;
        text-decoration: underline;
      }

      code {
        background-color: #f5f5f5;
        padding: 2px 6px;
        border-radius: 3px;
        font-family: 'Courier New', monospace;
        font-size: 0.9em;
      }

      pre {
        background-color: #2d2d2d;
        color: #f8f8f2;
        padding: 15px;
        border-radius: 5px;
        overflow-x: auto;
        margin: 20px 0;
        font-family: 'Courier New', monospace;
      }

      pre code {
        background: none;
        color: inherit;
        padding: 0;
      }

      blockquote {
        border-left: 4px solid #667eea;
        padding-left: 20px;
        margin: 20px 0;
        color: #666;
        font-style: italic;
      }

      ul, ol {
        margin: 15px 0;
        margin-left: 30px;
      }

      li {
        margin-bottom: 8px;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        margin: 20px 0;
      }

      th, td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: left;
      }

      th {
        background-color: #f5f5f5;
        font-weight: 600;
      }

      img {
        max-width: 100%;
        height: auto;
        border-radius: 5px;
      }

      @media (max-width: 768px) {
        nav {
          flex-direction: column;
          gap: 10px;
        }

        h1 { font-size: 2em; }
        h2 { font-size: 1.5em; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-container">
        <a href="/" class="site-title">Ashutosh Roy</a>
        <nav>
          <a href="/">Home</a>
          <a href="/about.html">About</a>
          <a href="/blog">Blog</a>
          <a href="/projects.html">Projects</a>
          <a href="/cv.html">CV</a>
        </nav>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer>
      <div class="container">
        <p>&copy; 2024 Ashutosh Roy. All rights reserved.</p>
        <p>
          <a href="https://www.linkedin.com/in/ashutosh-roy95/">LinkedIn</a> |
          <a href="https://github.com/fnuAshutosh">GitHub</a> |
          <a href="mailto:ashutosh.roy@example.com">Email</a>
        </p>
      </div>
    </footer>
  </body>
</html>
