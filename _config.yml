# Jekyll Configuration for GitHub Pages

# Site settings
title: Ashutosh Roy
email: ashutosh.roy@example.com
description: > # this means to ignore newlines until "baseurl:"
  Research Engineer | ML/AI Enthusiast | Building the Future of Artificial Intelligence
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://fnuashutosh.github.io" # the base hostname & protocol for your site

# Social Media
linkedin_username: ashutosh-roy95
github_username: fnuAshutosh
twitter_username: ""

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Minima theme configuration
minima:
  social_links:
    - platform: linkedin
      user_url: "https://www.linkedin.com/in/ashutosh-roy95/"
    - platform: github
      user_url: "https://github.com/fnuAshutosh"

# Collections
collections:
  blog_posts:
    output: true
    permalink: /blog/:name
